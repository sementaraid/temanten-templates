name: Deploy Template to CDN

on:
  push:
    tags:
      - '*/v*'          # e.g. jogja-1/v1.0.0 → deploys jogja-1
  workflow_dispatch:
    inputs:
      slug:
        description: 'Template slug (e.g. jogja-1)'
        required: true
      version:
        description: 'Version to deploy (e.g. 1.0.0) — leave blank to read from manifest.json'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve slug and version
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.slug }}" ]; then
            SLUG="${{ github.event.inputs.slug }}"
          else
            # tag format: jogja-1/v1.0.0 → slug = jogja-1
            SLUG="${GITHUB_REF_NAME%/v*}"
          fi

          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(node -p "JSON.parse(require('fs').readFileSync('templates/${SLUG}/manifest.json','utf8')).version")
          fi

          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy
        run: pnpm deploy --slug ${{ steps.meta.outputs.slug }} --version ${{ steps.meta.outputs.version }} --yes
        env:
          CDN_BUCKET: ${{ secrets.CDN_BUCKET }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: auto
